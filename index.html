<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C Compiler Visualizer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #eef6ff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(45, 212, 191, 0.18), transparent 34%),
          radial-gradient(circle at 80% 10%, rgba(217, 70, 239, 0.14), transparent 32%),
          linear-gradient(145deg, #070a12, #101827);
      }

      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 8px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34), 0 0 34px rgba(45, 212, 191, 0.16);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }

      p {
        margin: 0 0 18px;
        color: #94a3b8;
        line-height: 1.6;
      }

      code {
        display: block;
        margin: 10px 0;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 6px;
        background: rgba(2, 6, 23, 0.82);
        color: #67e8f9;
        white-space: pre-wrap;
      }

      a {
        color: #a5f3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>C Compiler Visualizer</h1>
      <p>This project is a Vite + React app. If you opened this file directly, start the dev servers first.</p>
      <code>npm install
npm run server</code>
      <p>Then open a second terminal:</p>
      <code>npm run dev</code>
      <p>Open <a href="http://localhost:5173">http://localhost:5173</a>.</p>
    </main>
  </body>
</html>
