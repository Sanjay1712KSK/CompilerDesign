<!DOCTYPE html>
<html>
<head>
<title>Compiler Visualizer</title>
<style>
body { font-family: Arial; background:#111; color:#eee; }
textarea { width:100%; height:120px; }
button { margin:5px; padding:10px; }
.output { background:#222; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<h2>Mini Compiler Visualizer</h2>

<textarea id="code">
int day = 4;
switch(day) {
 case 1: printf("Sunday"); break;
 case 4: printf("Wednesday"); break;
}
</textarea>

<br>

<button onclick="lexical()">Lexical Analysis</button>
<button onclick="syntax()">Syntax Analysis</button>
<button onclick="semantic()">Semantic Analysis</button>
<button onclick="icg()">Intermediate Code</button>
<button onclick="optimize()">Optimization</button>
<button onclick="target()">Target Code</button>

<div class="output" id="output"></div>

<script>

function lexical() {
    let out = `
int → KEYWORD
day → IDENTIFIER
= → OPERATOR
4 → NUMBER
switch → KEYWORD
`;
    document.getElementById("output").innerText = out;
}

function syntax() {
    let out = `
Program
 └── Declaration: int day = 4
 └── Switch(day)
      ├── Case 1
      └── Case 4
`;
    document.getElementById("output").innerText = out;
}

function semantic() {
    let out = `
✔ Variable 'day' declared
✔ Type checking passed
✔ Switch cases valid
No semantic errors
`;
    document.getElementById("output").innerText = out;
}

function icg() {
    let out = `
t1 = day
if t1 == 1 goto L1
if t1 == 4 goto L4
goto Ldefault

L4: print "Wednesday"
`;
    document.getElementById("output").innerText = out;
}

function optimize() {
    let out = `
Optimized:
Direct jump to matching case
Removed redundant checks
`;
    document.getElementById("output").innerText = out;
}

function target() {
    let out = `
MOV R1, 4
CMP R1, 4
JE PRINT_WEDNESDAY
`;
    document.getElementById("output").innerText = out;
}

</script>

</body>
</html>
